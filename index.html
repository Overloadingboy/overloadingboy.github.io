<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-2021454167052270">
    <meta name="google-site-verification" content="8Zrguc3EHXMbYg20P7UwIGef2ZH6ZlMLqM8OLIOiW3Y" />
    <title>Pro Tic Tac Toe - AI Levels</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #121212; color: white; }
        h1 { margin-top: 20px; color: #00d4ff; }
        .controls { margin: 20px; text-align: center; background: #1e1e1e; padding: 15px; border-radius: 10px; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); grid-gap: 10px; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background-color: #2a2a2a; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .cell:hover { background-color: #383838; }
        .cell.taken { cursor: not-allowed; }
        .status { margin-top: 20px; font-size: 1.2rem; height: 30px; }
        button { padding: 10px 20px; font-size: 1rem; cursor: pointer; background-color: #00d4ff; border: none; border-radius: 5px; color: black; font-weight: bold; margin-top: 20px; }
        input[type=range] { width: 200px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Tic Tac Toe AI</h1>

    <div class="controls">
        <label>Difficulty: Level <span id="levelDisplay">50</span></label><br>
        <input type="range" id="levelSlider" min="1" max="100" value="50" oninput="updateLevel(this.value)">
        <p style="font-size: 0.8rem; color: #888;">Level 100 is Unbeatable</p>
    </div>

    <div class="board" id="board">
        <div class="cell" onclick="makeMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div>
        <div class="cell" onclick="makeMove(7)"></div>
        <div class="cell" onclick="makeMove(8)"></div>
    </div>

    <div class="status" id="status">Your turn (X)</div>
    <button onclick="resetGame()">Reset Game</button>

    <script>
        let board = ['', '', '', '', '', '', '', '', ''];
        let gameActive = true;
        let difficulty = 50;
        const player = 'X';
        const ai = 'O';

        const scores = { 'X': -10, 'O': 10, 'tie': 0 };

        function updateLevel(val) {
            difficulty = val;
            document.getElementById('levelDisplay').innerText = val;
        }

        function makeMove(index) {
            if (board[index] === '' && gameActive) {
                board[index] = player;
                updateBoard();
                if (!checkGameOver()) {
                    document.getElementById('status').innerText = "AI is thinking...";
                    setTimeout(aiMove, 500);
                }
            }
        }

        function aiMove() {
            if (!gameActive) return;

            let move;
            let rand = Math.random() * 100;

            if (rand < difficulty) {
                // Use Minimax for "Smart" move
                move = getBestMove();
            } else {
                // Use Random for "Mistake"
                let available = board.map((val, idx) => val === '' ? idx : null).filter(val => val !== null);
                move = available[Math.floor(Math.random() * available.length)];
            }

            board[move] = ai;
            updateBoard();
            checkGameOver();
            if (gameActive) document.getElementById('status').innerText = "Your turn (X)";
        }

        function getBestMove() {
            let bestScore = -Infinity;
            let move;
            for (let i = 0; i < 9; i++) {
                if (board[i] === '') {
                    board[i] = ai;
                    let score = minimax(board, 0, false);
                    board[i] = '';
                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }
            return move;
        }

        function minimax(board, depth, isMaximizing) {
            let result = checkWinnerRaw();
            if (result !== null) return scores[result];

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === '') {
                        board[i] = ai;
                        let score = minimax(board, depth + 1, false);
                        board[i] = '';
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === '') {
                        board[i] = player;
                        let score = minimax(board, depth + 1, true);
                        board[i] = '';
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        function checkWinnerRaw() {
            const winPatterns = [
                [0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]
            ];
            for (let p of winPatterns) {
                if (board[p[0]] && board[p[0]] === board[p[1]] && board[p[0]] === board[p[2]]) return board[p[0]];
            }
            if (!board.includes('')) return 'tie';
            return null;
        }

        function checkGameOver() {
            let result = checkWinnerRaw();
            if (result) {
                gameActive = false;
                if (result === 'tie') {
                    document.getElementById('status').innerText = "It's a Tie!";
                } else {
                    document.getElementById('status').innerText = result === 'X' ? "You Won!" : "AI Won!";
                }
                return true;
            }
            return false;
        }

        function updateBoard() {
            const cells = document.getElementsByClassName('cell');
            for (let i = 0; i < 9; i++) {
                cells[i].innerText = board[i];
                if (board[i] !== '') cells[i].classList.add('taken');
            }
        }

        function resetGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            document.getElementById('status').innerText = "Your turn (X)";
            const cells = document.getElementsByClassName('cell');
            for (let cell of cells) {
                cell.innerText = '';
                cell.classList.remove('taken');
            }
        }
    </script>
</body>
</html>
